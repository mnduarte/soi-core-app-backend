# Fly.io config for the SOI NestJS backend.
# The app name is picked at first `fly launch` — replace `<APP_NAME>` then.
# Region: gru = São Paulo (closest to AR / lowest LATAM latency on Fly).

app = "soi-core-api"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Machines stop after a few minutes idle and auto-wake on the next
  # Keep 1 machine always running so there are no cold starts (the first
  # request of the day is instant). Extra machines above the minimum still
  # auto-stop when idle. Costs ~1 always-on shared-cpu-1x machine (~$2/mo).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
